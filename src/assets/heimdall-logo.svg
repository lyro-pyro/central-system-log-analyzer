<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
  <!-- Outer cross shape representing 4 connected octagons -->
  <path d="M 35,15 L 65,15 L 85,35 L 85,65 L 65,85 L 35,85 L 15,65 L 15,35 Z" />
  
  <!-- Inner diamond cutout -->
  <path d="M 50,32 L 68,50 L 50,68 L 32,50 Z" />
  
  <!-- Corner internal diagonals -->
  <line x1="15" y1="35" x2="35" y2="15" />
  <line x1="65" y1="15" x2="85" y2="35" />
  <line x1="85" y1="65" x2="65" y2="85" />
  <line x1="35" y1="85" x2="15" y2="65" />
  
  <!-- Crossbars to create the knots -->
  <line x1="15" y1="50" x2="32" y2="50" />
  <line x1="68" y1="50" x2="85" y2="50" />
  <line x1="50" y1="15" x2="50" y2="32" />
  <line x1="50" y1="68" x2="50" y2="85" />
</svg>
